// ===== CORNER ANALYSIS (彎道分析) =====
function getCornerData(){
  const rd=riders[0]?.data;if(!rd)return[];
  const corners=rd.corners||rd.track?.corners||[];
  if(!corners.length)return[];
  const valid=rd.laps.filter((l,i)=>!l.pit&&!excludedLaps.has(i));
  return corners.map(cn=>{
    const results=valid.map(lap=>{
      // Find closest point to corner
      let minD=Infinity,minIdx=0;
      lap.pts.forEach((p,i)=>{
        const d=Math.sqrt((p[4]-cn.la)**2+(p[5]-cn.lo)**2);
        if(d<minD){minD=d;minIdx=i;}
      });
      // Search window around corner for min speed
      const w=Math.min(15,Math.floor(lap.pts.length/4));
      const s=Math.max(0,minIdx-w),e=Math.min(lap.pts.length-1,minIdx+w);
      let minSpd=Infinity,entSpd=0,extSpd=0,maxGLat=0;
      for(let i=s;i<=e;i++){
        if(lap.pts[i][1]<minSpd)minSpd=lap.pts[i][1];
        if(Math.abs(lap.pts[i][7])>Math.abs(maxGLat))maxGLat=lap.pts[i][7];
      }
      entSpd=lap.pts[Math.max(0,s-3)]?lap.pts[Math.max(0,s-3)][1]:lap.pts[s][1];
      extSpd=lap.pts[Math.min(lap.pts.length-1,e+3)]?lap.pts[Math.min(lap.pts.length-1,e+3)][1]:lap.pts[e][1];
      return{lapId:lap.id,minSpd:Math.round(minSpd*10)/10,entSpd:Math.round(entSpd*10)/10,extSpd:Math.round(extSpd*10)/10,gLat:Math.round(maxGLat*100)/100,lean:Math.round(Math.atan(Math.abs(maxGLat))*180/Math.PI*10)/10};
    });
    const avgMin=results.reduce((a,r)=>a+r.minSpd,0)/results.length;
    const bestMin=Math.min(...results.map(r=>r.minSpd));
    const worstMin=Math.max(...results.map(r=>r.minSpd));
    return{name:cn.name,la:cn.la,lo:cn.lo,results,avgMin:Math.round(avgMin*10)/10,bestMin,worstMin,range:Math.round((worstMin-bestMin)*10)/10};
  });
}

function rCrn(){
  const rd=riders[0]?.data;if(!rd)return;
  const cData=getCornerData();
  const valid=rd.laps.filter((l,i)=>!l.pit&&!excludedLaps.has(i));

  // Lap consistency section
  let h='';
  if(valid.length>2){
    const mean=valid.reduce((a,x)=>a+x.dur,0)/valid.length;
    const stdev=Math.sqrt(valid.reduce((a,x)=>a+(x.dur-mean)**2,0)/valid.length);
    const consistency=((1-stdev/mean)*100).toFixed(1);
    h+=`<div class="cd"><h3>圈速穩定度</h3>
      <div class="sg">
        <div class="sc"><div class="v g">${consistency}%</div><div class="l">一致性</div></div>
        <div class="sc"><div class="v">${(stdev/1000).toFixed(2)}s</div><div class="l">標準差</div></div>
        <div class="sc"><div class="v">${ms2l(mean)}</div><div class="l">平均圈速</div></div>
        <div class="sc"><div class="v">${ms2l(Math.min(...valid.map(l=>l.dur)))}</div><div class="l">最速圈</div></div>
      </div>
      <canvas id="cvConsist" height="120"></canvas>
    </div>`;
  }

  // Corner min speed cards
  if(cData.length>0){
    h+=`<div class="cd"><h3>彎道最低速分析</h3><div class="crn-grid">`;
    cData.forEach(c=>{
      h+=`<div class="crn-card"><div class="crn-name">${c.name}</div>
        <div class="crn-val" style="color:${c.avgMin<60?'var(--green)':c.avgMin<100?'var(--orange)':'var(--red)'}">${c.avgMin} <span style="font-size:10px">km/h</span></div>
        <div class="crn-sub">最快 ${c.bestMin} / 最慢 ${c.worstMin}</div>
        <div class="crn-sub">差距 ${c.range} km/h</div></div>`;
    });
    h+=`</div></div>`;

    // Corner-by-corner table
    h+=`<div class="cd"><h3>彎道逐一比較表</h3><div class="tscr"><table class="mt"><thead><tr><th>彎道</th>`;
    valid.forEach(l=>{h+=`<th>L${l.id}</th>`;});
    h+=`<th>平均</th><th>最佳</th></tr></thead><tbody>`;
    cData.forEach(c=>{
      h+=`<tr><td style="color:var(--orange);font-weight:600">${c.name}</td>`;
      c.results.forEach(r=>{
        const isBest=r.minSpd===c.bestMin;
        h+=`<td style="${isBest?'color:var(--green);font-weight:700':''}">${r.minSpd}</td>`;
      });
      h+=`<td>${c.avgMin}</td><td style="color:var(--green);font-weight:700">${c.bestMin}</td></tr>`;
    });
    h+=`</tbody></table></div></div>`;

    // Corner lean angle table
    h+=`<div class="cd"><h3>彎道傾角推估</h3><div class="tscr"><table class="mt"><thead><tr><th>彎道</th>`;
    valid.forEach(l=>{h+=`<th>L${l.id}</th>`;});
    h+=`</tr></thead><tbody>`;
    cData.forEach(c=>{
      const maxLean=Math.max(...c.results.map(r=>r.lean));
      h+=`<tr><td style="color:var(--orange);font-weight:600">${c.name}</td>`;
      c.results.forEach(r=>{
        const isBest=r.lean===maxLean;
        h+=`<td style="${isBest?'color:var(--red);font-weight:700':''}">${r.lean}°</td>`;
      });
      h+=`</tr>`;
    });
    h+=`</tbody></table></div></div>`;

    // Corner min-speed bar chart per corner
    h+=`<div class="cd"><h3>彎道最低速（跨圈比較）</h3><canvas id="cvCrnSpd" height="220"></canvas></div>`;
  } else {
    h+=`<div class="cd"><h3>彎道分析</h3><p style="color:var(--text3);text-align:center;padding:20px;">需要賽道彎道資料（自動偵測賽道後顯示）</p></div>`;
  }

  // Brake consistency map
  h+=`<div class="cd"><h3>煞車點一致性（全圈疊加）</h3>
    <div class="brk-map-legend"><span style="color:var(--red)">● 煞車點</span><span style="color:var(--green)">● 油門點</span><span>透明度 = 圈次</span></div>
    <div id="brkMapDiv" style="height:320px;border-radius:6px;z-index:1;"></div></div>`;

  document.getElementById('acnt').innerHTML=h;
  setTimeout(()=>{
    // Consistency chart
    if(valid.length>2){
      const r2=sC2('cvConsist',120);if(r2){
        const{x:ctx,W,H}=r2;const cs=getComputedStyle(document.documentElement);
        ctx.fillStyle=cs.getPropertyValue('--bg');ctx.fillRect(0,0,W,H);
        const P={l:46,r:10,t:10,b:22},gW=W-P.l-P.r,gH=H-P.t-P.b;
        const durs=valid.map(l=>l.dur);const mean=durs.reduce((a,b)=>a+b)/durs.length;
        const stdev=Math.sqrt(durs.reduce((a,d)=>(a+(d-mean)**2),0)/durs.length);
        const mn=Math.min(...durs)*0.99,mx=Math.max(...durs)*1.01;
        // Mean line
        const my=P.t+gH-((mean-mn)/(mx-mn))*gH;
        ctx.strokeStyle=cs.getPropertyValue('--text3');ctx.setLineDash([4,3]);ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(P.l,my);ctx.lineTo(P.l+gW,my);ctx.stroke();ctx.setLineDash([]);
        ctx.fillStyle=cs.getPropertyValue('--text3');ctx.font='9px sans-serif';ctx.textAlign='left';
        ctx.fillText('平均 '+ms2l(mean),P.l+gW-65,my-4);
        // Std dev band
        const sy1=P.t+gH-(((mean+stdev)-mn)/(mx-mn))*gH;
        const sy2=P.t+gH-(((mean-stdev)-mn)/(mx-mn))*gH;
        ctx.fillStyle='rgba(88,166,255,0.1)';ctx.fillRect(P.l,sy1,gW,sy2-sy1);
        // Bars
        const bw=Math.min(24,gW/valid.length-4);
        valid.forEach((l,i)=>{
          const x=P.l+(i+0.5)*(gW/valid.length)-bw/2;
          const ht=((l.dur-mn)/(mx-mn))*gH;const y=P.t+gH-ht;
          const dev=Math.abs(l.dur-mean);
          ctx.fillStyle=dev<stdev?'rgba(63,185,80,0.7)':dev<stdev*2?'rgba(240,136,62,0.7)':'rgba(248,81,73,0.7)';
          ctx.fillRect(x,y,bw,ht);
          ctx.fillStyle=cs.getPropertyValue('--text3');ctx.font='8px sans-serif';ctx.textAlign='center';
          ctx.fillText('L'+l.id,x+bw/2,H-P.b+10);
          ctx.fillText(ms2l(l.dur),x+bw/2,y-2);
        });
      }
    }

    // Corner speed grouped bar chart
    if(cData.length>0&&document.getElementById('cvCrnSpd')){
      const r2=sC2('cvCrnSpd',220);if(r2){
        const{x:ctx,W,H}=r2;const cs=getComputedStyle(document.documentElement);
        ctx.fillStyle=cs.getPropertyValue('--bg');ctx.fillRect(0,0,W,H);
        const P={l:36,r:8,t:10,b:28},gW=W-P.l-P.r,gH=H-P.t-P.b;
        const allSpds=cData.flatMap(c=>c.results.map(r=>r.minSpd));
        const mx=Math.max(...allSpds)*1.1;
        const grpW=gW/cData.length;
        const nLaps=cData[0].results.length;
        const bw=Math.min(10,grpW/(nLaps+1));
        const colors=['#f85149','#58a6ff','#3fb950','#f0883e','#bc8cff','#e6edf3','#6e7681','#ff7b72','#79c0ff','#56d364'];
        cData.forEach((c,ci)=>{
          const gx=P.l+ci*grpW;
          c.results.forEach((r,ri)=>{
            const x=gx+(ri+0.5)*grpW/(nLaps+0.5)-bw/2;
            const ht=(r.minSpd/mx)*gH;const y=P.t+gH-ht;
            ctx.fillStyle=colors[ri%colors.length];ctx.globalAlpha=0.7;
            ctx.fillRect(x,y,bw,ht);ctx.globalAlpha=1;
          });
          ctx.fillStyle=cs.getPropertyValue('--text3');ctx.font='9px sans-serif';ctx.textAlign='center';
          ctx.fillText(c.name,gx+grpW/2,H-P.b+12);
        });
      }
    }

    // Brake consistency map
    const bm=document.getElementById('brkMapDiv');
    if(bm){
      const map2=L.map(bm,{zoomControl:true,attributionControl:false}).setView([22.4525,120.4825],16);
      L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19}).addTo(map2);
      // Draw track from best lap
      const bLap=rd.laps.find(l=>l.id===rd.bestId);
      if(bLap){
        L.polyline(bLap.pts.map(p=>[p[4],p[5]]),{color:'#6e7681',weight:2,opacity:0.5}).addTo(map2);
        map2.fitBounds(L.latLngBounds(bLap.pts.map(p=>[p[4],p[5]])),{padding:[20,20]});
      }
      // Overlay brake/throttle points from all laps
      valid.forEach((lap,li)=>{
        const alpha=0.3+0.5*(li/(valid.length-1||1));
        (lap.brk||[]).forEach(idx=>{
          if(idx<lap.pts.length){
            const p=lap.pts[idx];
            L.circleMarker([p[4],p[5]],{radius:4,color:'#f85149',fillColor:'#f85149',fillOpacity:alpha,weight:0}).addTo(map2);
          }
        });
        (lap.thr||[]).forEach(idx=>{
          if(idx<lap.pts.length){
            const p=lap.pts[idx];
            L.circleMarker([p[4],p[5]],{radius:3,color:'#3fb950',fillColor:'#3fb950',fillOpacity:alpha*0.7,weight:0}).addTo(map2);
          }
        });
      });
    }
  },150);
}

// ===== DAMPING ANALYSIS (阻尼分析) =====
function rDamp(){
  const l=gL();if(!l)return;
  const issues=analyzeDamping(l);
  const score=calcDampingScore(issues);
  const forkIssues=issues.filter(x=>x.zone==='fork').length;
  const shockIssues=issues.filter(x=>x.zone==='shock').length;
  const forkScore=Math.max(20,100-forkIssues*12);
  const shockScore=Math.max(20,100-shockIssues*12);
  const scoreCol=score>80?'#3fb950':score>50?'#f0883e':'#f85149';

  // === 0. Lap filter ===
  let h=renderLapFilter();

  // === 1. Score cards ===
  h+=`<div class="sg">
    <div class="sc"><div class="v" style="color:${scoreCol};font-size:28px;font-weight:600;">${score}</div><div class="l">${t('dampHealth')}</div></div>
    <div class="sc"><div class="v" style="color:${forkScore>80?'#3fb950':forkScore>50?'#f0883e':'#f85149'}">${forkScore}</div><div class="l">${t('frontFork')}</div></div>
    <div class="sc"><div class="v" style="color:${shockScore>80?'#3fb950':shockScore>50?'#f0883e':'#f85149'}">${shockScore}</div><div class="l">${t('rearShock')}</div></div>
    <div class="sc"><div class="v">${issues.length}</div><div class="l">${t('issuesFound')}</div></div>
  </div>`;

  // === 2. Charts FIRST (user sees the data, then reads analysis below) ===
  h+=`<div style="padding:0 4px;">
    <div style="display:flex;align-items:center;gap:12px;margin:12px 0 6px;">
      <span style="font-size:12px;font-weight:600;color:var(--orange);">${curLang==='zh'?'懸吊行程':'Suspension Travel'}</span>
      <span style="font-size:10px;color:#58a6ff;">● ${curLang==='zh'?'前叉':'Fork'}</span>
      <span style="font-size:10px;color:#f0883e;">● ${curLang==='zh'?'後避震':'Shock'}</span>
    </div>
    <canvas id="dampSuspChart" style="width:100%;"></canvas>
    <div style="font-size:12px;font-weight:600;margin:12px 0 6px;color:var(--orange);">${curLang==='zh'?'縱向 G 力':'Longitudinal G'}</div>
    <canvas id="dampGChart" style="width:100%;"></canvas>
  </div>`;

  // === 3. Issue grid — compact cards matching score card style ===
  if(issues.length===0){
    h+=`<div style="text-align:center;padding:20px;color:var(--text2);font-size:13px;">${t('noIssues')}</div>`;
  } else {
    h+=`<div class="sg" style="margin-top:4px;">`;
    issues.forEach(iss=>{
      const sevCol=iss.severity==='severe'?'#f85149':iss.severity==='moderate'?'#f0883e':'#ffc107';
      const compName=iss.zone==='fork'?(curLang==='zh'?'前叉':'Fork'):(curLang==='zh'?'後避震':'Shock');
      const sug=curLang==='zh'?iss.suggestion_zh:iss.suggestion_en;
      const t0=(iss.startTime/1000).toFixed(1),t1=(iss.endTime/1000).toFixed(1);
      h+=`<div class="sc" style="cursor:pointer;border-left:2px solid ${sevCol};" onclick="zoomRange={start:${iss.startTime/l.dur},end:${iss.endTime/l.dur}};render();">
        <div class="v" style="color:${sevCol};font-size:13px;font-weight:700;">${t0}~${t1}s</div>
        <div class="l" style="font-size:10px;line-height:1.3;white-space:normal;">${compName}：${sug}</div>
      </div>`;
    });
    h+=`</div>`;
  }

  document.getElementById('acnt').innerHTML=h;

  // === 4. Draw charts ===
  setTimeout(()=>{
    const forkData=[],shockData=[];
    l.pts.forEach(p=>{forkData.push([p[0]/1000,p[2]]);shockData.push([p[0]/1000,p[3]]);});
    dChart('dampSuspChart',[{d:forkData,c:'#58a6ff',w:1.5},{d:shockData,c:'#f0883e',w:1.5}],{h:160});

    // Highlight issue zones on susp chart (context already has DPR scale from dChart/sC2)
    const cv=document.getElementById('dampSuspChart');
    if(cv&&issues.length>0){
      const ctx=cv.getContext('2d');
      const W=cv.clientWidth,H=160;
      const P={l:42,r:10,t:10,b:22};
      const gW=W-P.l-P.r,gH=H-P.t-P.b;
      // X range must match what dChart computed from the data
      const mnX=forkData[0][0],mxX=forkData[forkData.length-1][0];
      issues.forEach(iss=>{
        const issT0=iss.startTime/1000,issT1=iss.endTime/1000;
        const x0=P.l+((issT0-mnX)/(mxX-mnX))*gW;
        const x1=P.l+((issT1-mnX)/(mxX-mnX))*gW;
        if(x1>P.l&&x0<P.l+gW){
          const col=iss.severity==='severe'?'rgba(248,81,73,0.2)':iss.severity==='moderate'?'rgba(240,136,62,0.2)':'rgba(255,193,7,0.2)';
          ctx.fillStyle=col;
          ctx.fillRect(Math.max(P.l,x0),P.t,Math.min(x1,P.l+gW)-Math.max(P.l,x0),gH);
          // Time label at top of zone
          const cx=(Math.max(P.l,x0)+Math.min(x1,P.l+gW))/2;
          ctx.fillStyle=iss.severity==='severe'?'#f85149':'#f0883e';
          ctx.font='bold 9px sans-serif';ctx.textAlign='center';
          ctx.fillText(issT0.toFixed(1)+'s',cx,P.t+10);
        }
      });
    }

    const gLonData=[];
    l.pts.forEach(p=>{gLonData.push([p[0]/1000,p[6]]);});
    dChart('dampGChart',[{d:gLonData,c:'#3fb950',w:1.5,f:true,fc:'rgba(63,185,80,0.08)'}],{h:120,mnY:-2,mxY:2,dc:1});
  },50);
}

// ===== SUGGESTIONS (最佳化建議) =====
function rSug(){
  const rd=riders[0]?.data;if(!rd)return;
  const valid=rd.laps.filter((l,i)=>!l.pit&&!excludedLaps.has(i));
  const bestLap=rd.laps.find(l=>l.id===rd.bestId);
  const cData=getCornerData();

  let suggestions=[];

  // 1. Sector analysis - find weakest sector
  if(valid.length>1){
    for(let s=0;s<3;s++){
      const times=valid.map(l=>l.secs[s]).filter(t=>t>0);
      if(times.length<2)continue;
      const best=Math.min(...times);const worst=Math.max(...times);
      const gap=(worst-best)/1000;
      if(gap>0.5){
        suggestions.push({
          pri:gap>1.5?'high':gap>0.8?'med':'low',
          title:`Sector ${s+1} 穩定性不足`,
          body:`最快 ${(best/1000).toFixed(1)}s vs 最慢 ${(worst/1000).toFixed(1)}s，差距 <span class="sug-metric">${gap.toFixed(2)}s</span>。建議專注練習此分段的節奏一致性。`
        });
      }
    }
  }

  // 2. Corner speed suggestions
  cData.forEach(c=>{
    if(c.range>5){
      suggestions.push({
        pri:c.range>15?'high':c.range>8?'med':'low',
        title:`${c.name} 入彎速度不一致`,
        body:`最低速差距 <span class="sug-metric">${c.range} km/h</span>（${c.bestMin}～${c.worstMin} km/h）。差距越小代表技術越穩定，建議找到可重複的煞車點。`
      });
    }
  });

  // 3. Braking consistency
  valid.forEach((lap,li)=>{
    if(li===0)return;
    const prevLap=valid[li-1];
    const durDiff=(lap.dur-prevLap.dur)/1000;
    if(durDiff>2){
      suggestions.push({
        pri:durDiff>4?'high':'med',
        title:`L${lap.id} 比 L${prevLap.id} 慢了 ${durDiff.toFixed(1)}s`,
        body:`連續掉速可能是輪胎衰退、體力下降或注意力不集中。檢查此圈的速度曲線找出掉速段落。`
      });
    }
  });

  // 4. Theoretical best gap
  if(bestLap){
    const theoGap=(bestLap.dur-rd.theoBest)/1000;
    if(theoGap>0.3){
      suggestions.push({
        pri:theoGap>1?'high':theoGap>0.5?'med':'low',
        title:`理論最速圈差距 ${theoGap.toFixed(3)}s`,
        body:`你的最速圈 ${ms2l(bestLap.dur)} vs 理論 ${ms2l(rd.theoBest)}。把每個分段的最佳表現組合起來還有 <span class="sug-metric">${theoGap.toFixed(3)}s</span> 可以進步。`
      });
    }
  }

  // 5. Max speed utilization
  if(valid.length>1){
    const maxSpds=valid.map(l=>l.maxS);
    const topSpd=Math.max(...maxSpds);
    const avgMaxSpd=maxSpds.reduce((a,b)=>a+b)/maxSpds.length;
    const spdGap=topSpd-avgMaxSpd;
    if(spdGap>5){
      suggestions.push({
        pri:spdGap>15?'high':'med',
        title:`尾速/極速未充分利用`,
        body:`最高 ${topSpd} km/h vs 平均極速 ${avgMaxSpd.toFixed(1)} km/h，差距 <span class="sug-metric">${spdGap.toFixed(1)} km/h</span>。可能是出彎點不夠理想或油門開度不足。`
      });
    }
  }

  // 6. Lap time trend (degradation)
  if(valid.length>=4){
    const first3=valid.slice(0,3).reduce((a,l)=>a+l.dur,0)/3;
    const last3=valid.slice(-3).reduce((a,l)=>a+l.dur,0)/3;
    const degrade=(last3-first3)/1000;
    if(degrade>1){
      suggestions.push({
        pri:degrade>3?'high':degrade>1.5?'med':'low',
        title:`後段圈速衰退 ${degrade.toFixed(1)}s`,
        body:`前 3 圈平均 ${ms2l(first3)} → 後 3 圈平均 ${ms2l(last3)}。可能是輪胎過熱衰退或騎士體力下降，建議調整騎乘節奏。`
      });
    }
  }

  // Sort by priority
  const priOrder={high:0,med:1,low:2};
  suggestions.sort((a,b)=>priOrder[a.pri]-priOrder[b.pri]);

  let h=renderLapFilter();
  h+=`<div class="cd"><h3>AI 最佳化建議（${suggestions.length} 項）</h3>`;
  if(suggestions.length===0){
    h+=`<p style="color:var(--green);text-align:center;padding:20px;">表現優秀！暫無明顯改善建議。</p>`;
  }
  suggestions.forEach(s=>{
    h+=`<div class="sug-card">
      <div class="sug-title"><span class="sug-pri ${s.pri}">${s.pri==='high'?'重要':s.pri==='med'?'中等':'輕微'}</span>${s.title}</div>
      <div class="sug-body">${s.body}</div>
    </div>`;
  });
  h+=`</div>`;

  // PDF export button
  h+=`<div class="cd"><h3>單圈報告匯出</h3>
    <p style="color:var(--text3);font-size:11px;margin-bottom:8px;">選擇圈數後產生完整分析報告</p>
    <button class="pdf-btn" onclick="exportPDF()">📄 匯出 PDF 報告（目前選擇圈）</button>
  </div>`;

  // Multi-session history

// Save session to history on data load
function saveSessionHist(){
  const rd=riders[0]?.data;if(!rd)return;
  const valid=rd.laps.filter((l,i)=>!l.pit&&!excludedLaps.has(i));if(!valid.length)return;
  const best=valid.reduce((b,l)=>l.dur<b.dur?l:b,valid[0]);
  const entry={
    date:new Date(riders[0].data.sessionDate||Date.now()).toLocaleString('zh-TW'),
    track:riders[0].data.trackName||'未知賽道',
    laps:valid.length,
    best:ms2l(best.dur),
    maxSpd:Math.max(...valid.map(l=>l.maxS)),
    avgLap:ms2l(valid.reduce((a,l)=>a+l.dur,0)/valid.length),
    consistency:valid.length>2?((1-Math.sqrt(valid.reduce((a,l)=>a+(l.dur-valid.reduce((s,x)=>s+x.dur,0)/valid.length)**2,0)/valid.length)/(valid.reduce((s,x)=>s+x.dur,0)/valid.length))*100).toFixed(1)+'%':'N/A'
  };
  try{
    let hist=JSON.parse(localStorage.getItem('tHistory')||'[]');
    hist.push(entry);
    if(hist.length>50)hist=hist.slice(-50);
    localStorage.setItem('tHistory',JSON.stringify(hist));
  }catch(e){}
}

  valid.forEach(l=>{

  {

      });
      content+=`</table>`;
    }
  }

  content+=`<div class="footer">由 RES Instrument 產生 — ${new Date().toLocaleString('zh-TW')}</div></body></html>`;

function loadVid(file){
  if(!file)return;
  const url=URL.createObjectURL(file);
  const cont=document.getElementById('vidContainer');
  const drop=document.getElementById('vidDrop');
  const player=document.getElementById('vidPlayer');
  if(cont)cont.style.display='block';
  if(drop)drop.style.display='none';
  if(player){
    player.src=url;
    vidEl=player;
    player.addEventListener('timeupdate',onVidTime);
  }
  toast('影片已載入');
}

function onVidTime(){
  if(!vidEl||!vidSyncOn)return;
  const vt=vidEl.currentTime+vidOffset;
  const lap=gL();if(!lap)return;
  const ratio=Math.max(0,Math.min(1,(vt*1000)/lap.dur));
  const idx=Math.round(ratio*(lap.pts.length-1));
  const pt=lap.pts[idx];if(!pt)return;

  const el=id=>document.getElementById(id);
  if(el('vciTime'))el('vciTime').textContent=vidEl.currentTime.toFixed(1)+'s';
  if(el('vciData'))el('vciData').textContent=(vt).toFixed(1)+'s';
  if(el('vciSpd'))el('vciSpd').textContent=pt[1].toFixed(0);
  if(el('vciG'))el('vciG').textContent='縱'+pt[6].toFixed(1)+' 橫'+pt[7].toFixed(1);
}

function syncVidToData(){
  if(!vidEl)return;
  const lap=gL();if(!lap)return;
  const dataT=(syncPos*lap.dur)/1000;
  vidOffset=dataT-vidEl.currentTime;
  const input=document.getElementById('vidOffsetInput');
  if(input)input.value=vidOffset.toFixed(1);
  toast('已同步：偏移 '+vidOffset.toFixed(1)+'s');
}

  // Track DB display
  const tl=document.getElementById('trackList');
  if(tl){tl.innerHTML='';TRACK_DB.forEach(t=>{
    tl.innerHTML+=`<div style="background:var(--bg3);padding:8px;border-radius:6px;text-align:center;">
      <div style="font-size:12px;font-weight:600;">${t.name}</div>
      <div style="font-size:10px;color:var(--text3);">${t.length}m / ${t.turns}彎</div>
    </div>`;
  });}

}

setTimeout(()=>{
  INIT_DATA.rider='選手 1';
  riders.push({name:'選手 1',color:COL[0],data:INIT_DATA,visible:true});
  showApp();
},600);
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
